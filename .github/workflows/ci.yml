name: CI

on:
  push:
    branches: [develop]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.4']
    name: PHP ${{ matrix.php }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Coding standards (ECS)
        run: vendor/bin/ecs check --no-progress-bar

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan --memory-limit=1G --no-progress
